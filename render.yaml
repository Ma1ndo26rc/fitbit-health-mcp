services:
  - type: web
    name: fitbit-health-mcp
    runtime: python
    plan: free
    numInstances: 1
    buildCommand: python -m pip install .
    startCommand: python -m fitbit_health.http_mcp_server
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: MCP_BEARER_TOKEN
        sync: false
      - key: OAUTH_BOOTSTRAP_PASSWORD
        sync: false
      - key: OAUTH_COOKIE_SECRET
        generateValue: true
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: FITBIT_HEALTH_TOKEN_PATH
        value: /opt/render/project/src/.private/token.json
      - key: FITBIT_HEALTH_TOKEN_SEED_PATH
        value: /etc/secrets/token.json
      - key: FITBIT_HEALTH_CLIENT_SECRET_PATH
        value: /etc/secrets/client_secret_render.json
